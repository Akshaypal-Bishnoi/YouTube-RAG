<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube RAG · Ask Videos</title>

  <meta name="description" content="Ask questions about YouTube videos using Retrieval-Augmented Generation." />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>

<header>
  <div class="brand">
    <div class="logo">R</div>
    <div>YouTube RAG</div>
  </div>
</header>

<main>
  <!-- Sidebar -->
  <aside class="card">
    <div class="card-header">
      <div class="card-title">Video Context</div>
    </div>

    <div class="card-body stack">
      <div>
        <label>YouTube URL</label>
        <input id="videoUrl" placeholder="https://youtube.com/watch?v=..." />
      </div>

      <button class="btn btn-primary" id="loadVideo">
        Load & Index Video
      </button>

      <button class="btn btn-secondary" id="loadExample">
        Try Example
      </button>

      <div class="status">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Waiting for video</span>
      </div>
    </div>
  </aside>

  <!-- Chat -->
  <section class="card chat">
    <div class="messages" id="messages">
      <div class="msg bot">
        Paste a YouTube link on the left, index the video, and ask questions about its content here!
      </div>
    </div>

    <div class="composer">
      <input
        id="questionInput"
        placeholder="Ask something about the video..."
      />
      <button class="btn btn-primary" id="sendBtn">Ask</button>
    </div>
  </section>
</main>

<footer>
  © 2026 · YouTube RAG · HTML / CSS / JS
</footer>

<!-- JS -->
<script src="./js/app.js"></script>
</body>
</html>
